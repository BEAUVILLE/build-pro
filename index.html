<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>DIGIY BUILD PRO — Entrée</title>
  <meta name="theme-color" content="#061b14"/>
  <meta name="description" content="Entrée BUILD PRO vers PIN en conservant slug, phone et paramètres utiles."/>

  <style>
    :root{
      --bg:#061b14;
      --bg2:#0a2b1f;
      --line:rgba(255,255,255,.12);
      --text:#eafff1;
      --muted:rgba(234,255,241,.72);
      --gold:#facc15;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(250,204,21,.10), transparent 55%),
        linear-gradient(135deg,var(--bg),var(--bg2));
      padding:18px;
    }

    .card{
      width:min(520px, 100%);
      padding:24px;
      border-radius:22px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      text-align:center;
      box-shadow:0 18px 55px rgba(0,0,0,.45);
    }

    .logo{
      width:62px;
      height:62px;
      margin:0 auto 14px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:28px;
      font-weight:1000;
      color:#062015;
      background:linear-gradient(135deg, rgba(34,197,94,.92), rgba(250,204,21,.92));
    }

    h1{
      margin:0;
      font-size:24px;
      line-height:1.1;
    }

    p{
      margin:10px 0 0;
      color:var(--muted);
      line-height:1.5;
      font-size:14px;
      font-weight:700;
    }

    .hint{
      margin-top:14px;
      font-size:12px;
      color:var(--gold);
      font-weight:900;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .fallback{
      margin-top:18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:12px 16px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--text);
      text-decoration:none;
      font-weight:900;
    }

    .fallback:hover{
      border-color:rgba(250,204,21,.45);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛠️</div>
    <h1>DIGIY BUILD PRO</h1>
    <p>Entrée sécurisée vers ton espace pro.</p>
    <p>On garde ton slug et on t’envoie proprement vers le PIN.</p>
    <div class="hint">MULTI SERVICES • RAIL PRO</div>

    <a class="fallback" id="fallbackLink" href="./pin.html">🔑 Ouvrir le PIN</a>
  </div>

  <script>
    (function () {
      const src = new URL(location.href);
      const dest = new URL("./pin.html", location.href);

      const slug = (src.searchParams.get("slug") || "").trim();
      const phone = (src.searchParams.get("phone") || "").trim();

      if (slug) dest.searchParams.set("slug", slug);
      if (phone) dest.searchParams.set("phone", phone);

      for (const [k, v] of src.searchParams.entries()) {
        if (k === "slug" || k === "phone") continue;
        if (!dest.searchParams.has(k)) dest.searchParams.set(k, v);
      }

      document.getElementById("fallbackLink").href = dest.toString();

      setTimeout(() => {
        location.replace(dest.toString());
      }, 120);
    })();
  </script>
</body>
</html>
